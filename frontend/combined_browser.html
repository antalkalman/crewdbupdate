<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrewDB Combined Browser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-theme-quartz.css">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Crew DB</h2>
      <div class="app-version">v3.1</div>
      <nav class="menu">
        <a href="/export">Export</a>
        <a href="/sf_browser">SF Browser</a>
        <a href="/sf_issues">SF Issues</a>
        <a class="active" href="/crew_explorer">Crew Explorer</a>
        <a href="/registry">Registry</a>
        <a href="/titles">Titles</a>
        <a href="/match">Match</a>
      </nav>
      <div class="workflow-status" id="workflow-status-panel">
        <h3>Workflow</h3>
        <div class="workflow-step todo" id="ws-export">
          <span class="icon"></span>
          <div>
            <div class="label">Export</div>
            <div class="detail" id="ws-export-detail">&mdash;</div>
          </div>
        </div>
        <div class="workflow-step todo" id="ws-titles">
          <span class="icon"></span>
          <div>
            <div class="label">Titles</div>
            <div class="detail" id="ws-titles-detail">&mdash;</div>
          </div>
        </div>
        <div class="workflow-step todo" id="ws-pipeline">
          <span class="icon"></span>
          <div>
            <div class="label">Pipeline</div>
            <div class="detail" id="ws-pipeline-detail">&mdash;</div>
          </div>
        </div>
        <div class="workflow-step todo" id="ws-match">
          <span class="icon"></span>
          <div>
            <div class="label">Match</div>
            <div class="detail" id="ws-match-detail">&mdash;</div>
          </div>
        </div>
        <button class="workflow-action-btn" id="ws-run-pipeline" style="display:none">&#9654; Run Pipeline</button>
        <button class="workflow-action-btn" id="ws-run-match" style="display:none">&#9654; Run Matching</button>
      </div>
    </aside>

    <main>
      <h1>Combined Browser</h1>
      <div class="toolbar">
        <span id="combined-file-info"></span>
        <label for="combined-page-size">Page size:</label>
        <select id="combined-page-size">
          <option value="100">100</option>
          <option value="200" selected>200</option>
          <option value="500">500</option>
        </select>
        <input id="combined-search" type="text" placeholder="Quick search (current page)" />
        <button id="combined-refresh" type="button">Refresh</button>
        <button id="combined-export-csv" type="button">Export current view to CSV</button>
        <button id="export-excel" type="button">Export to Excel</button>
      </div>

      <div class="toolbar">
        <label><input id="combined-running-only" type="checkbox" checked /> Only Running Projects</label>
        <label for="combined-project-filter">Project:</label>
        <select id="combined-project-filter" multiple size="4"></select>
        <label for="combined-origin-filter">Origin:</label>
        <select id="combined-origin-filter" multiple size="4"></select>
        <label for="combined-dept-filter">General Department:</label>
        <select id="combined-dept-filter" multiple size="4"></select>
        <label for="combined-title-filter">General Title:</label>
        <select id="combined-title-filter" multiple size="4"></select>
      </div>

      <div class="toolbar">
        <label>View:</label>
        <label><input type="radio" name="combined-view-mode" value="general" checked /> General</label>
        <label><input type="radio" name="combined-view-mode" value="project" /> On Project</label>
        <label><input type="radio" name="combined-view-mode" value="full" /> Full</label>
        <label><input id="combined-show-fee" type="checkbox" /> Show Daily Fee</label>
      </div>

      <div class="pager">
        <button id="combined-prev" type="button">Prev</button>
        <span id="combined-page-info">Page 1</span>
        <button id="combined-next" type="button">Next</button>
        <span id="combined-total-info"></span>
      </div>

      <div id="combined-result-message" aria-live="polite"></div>
      <div id="combined-grid" class="ag-theme-quartz browser-grid"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/dist/ag-grid-community.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/combined_browser.js"></script>
  <script src="/js/workflow.js"></script>
</body>
</html>
